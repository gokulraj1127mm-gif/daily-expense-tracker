version: '3.8'

services:
  mongodb:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/expense_tracker
      JWT_SECRET: mysecretkey123
      PORT: 5000
    depends_on:
      - mongodb

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000  # <--- Add this line
    depends_on:
      - backend